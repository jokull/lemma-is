services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_DB: lemma_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    shm_size: 256mb
    command: >
      postgres
      -c shared_preload_libraries=pg_textsearch
      -c log_statement=none
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d lemma_test"]
      interval: 2s
      timeout: 5s
      retries: 10
